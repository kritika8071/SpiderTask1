<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>King Of Diamonds</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
    <div class="inputBox">
        <div id="inputText">INPUT A NUMBER!</div>
        <input type="number" id="numberBox">
        <button id="submitBtn">Submit</button>
    </div>
    <div class="scoreBoard" id="scoreboardText">
        <div id="roundNo"></div>
        <div id="playerGuess"></div>
        <div id="botGuess"></div>
        <div id="targetNumber"></div>
        <div id="winner"></div>
        <button id="exitBtn">Exit Game</button>
        <button id="nextRoundBtn">Next Round</button>
    </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
